<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="Mercy Revival — site coming soon." />
<title>Mercy Revival — Coming Soon</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%;
  height: 100%;
  background: #000000;
  color: #e8dcc4;
  font-family: 'Inter', system-ui, sans-serif;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

body {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 24px;
}

.message {
  font-family: 'Cormorant Garamond', 'Times New Roman', serif;
  font-style: italic;
  font-weight: 400;
  font-size: clamp(28px, 5vw, 56px);
  letter-spacing: .01em;
  color: #e8dcc4;
  opacity: 0;
  animation: fadeIn 1.6s ease-out 0.4s forwards;
}

.credit {
  position: absolute;
  bottom: 32px;
  left: 0; right: 0;
  font-size: 11px;
  letter-spacing: .35em;
  text-transform: uppercase;
  color: rgba(232, 220, 196, .45);
  opacity: 0;
  animation: fadeIn 1.4s ease-out 1.4s forwards;
}

.credit a {
  color: #e6b53d;
  text-decoration: none;
  border-bottom: 1px solid rgba(230, 181, 61, .25);
  padding-bottom: 1px;
  transition: color .8s ease, border-color .8s ease;
}

.credit a:hover {
  color: #e8dcc4;
  border-bottom-color: #e8dcc4;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: .01ms !important;
    transition-duration: .01ms !important;
  }
}
</style>
</head>
<body>

<div class="message">Site coming soon.</div>

<div class="credit">
  Powered by <a href="https://mediatwistgroup.com" target="_blank" rel="noopener">Mediatwist</a>
</div>

</body>
</html>
